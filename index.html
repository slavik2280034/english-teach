<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <!-- Фон для затемнення -->
    <div class="overlay" id="overlay"></div>

    <!-- Блок з помилкою -->
    <div class="error-modal" id="errorModal">
        <p>Упс! Реєстрація поки не працює 😔</p>
        <button class="ok-btn" onclick="closeError()">ОК</button>
    </div>

    <div class="container">
        <div class="header-text">
            <h1>Вітаю на курсах англійської мови!</h1>
            <div class="warning-box">
                <span>⚠️</span>
                <p>Увага! Сайт у розробці, більшість функцій можуть не працювати. Вибачте!</p>
            </div>
        </div>

        <div class="content">
            <form id="loginForm">
                <input type="text" id="firstName" placeholder="Ім'я" required>
                <input type="text" id="lastName" placeholder="Прізвище" required>
                <input type="email" id="email" placeholder="ваша електронна пошта" required>
                <input type="tel" id="phone" placeholder="номер телефону" required>
                <input type="password" id="password" placeholder="Ваш пароль" required>

                <button type="submit" class="submit-btn">відправити</button>
            </form>

            <div class="register-link">
                <p>Немає акаунту?</p>
                <button class="secondary-btn" onclick="showError()">
                    Зареєструватися
                </button>
            </div>

            <div class="warning-text">
                <p>Увага! Проект ще не запущений, прошу зайдіть пізніше.</p>
            </div>
        </div>
    </div>
    <script src="error.js"></script>
</body>

</html>
